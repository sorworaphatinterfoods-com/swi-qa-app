name = "swi-qa-api"
main = "worker.js"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# ==================================================
# D1 Database — use the existing qa-factory-db
# ==================================================
[[d1_databases]]
binding       = "DB"
database_name = "qa-factory-db"
database_id   = "REPLACE_WITH_YOUR_DATABASE_ID"   # ใส่ ID จาก: wrangler d1 list

# ==================================================
# KV Namespaces
# ==================================================
[[kv_namespaces]]
binding = "SESSION"
id      = "REPLACE_WITH_SESSION_KV_ID"

[[kv_namespaces]]
binding = "CACHE"
id      = "REPLACE_WITH_CACHE_KV_ID"

# ==================================================
# Environment Variables
# ==================================================
[vars]
ENVIRONMENT = "production"

# JWT_SECRET ตั้งใน Cloudflare dashboard > Settings > Variables (Secret)
# หรือใช้คำสั่ง: wrangler secret put JWT_SECRET

# ==================================================
# Routes (เลือกอันใดอันหนึ่ง)
# ==================================================
# วิธีที่ 1: ใช้ workers.dev subdomain (เริ่มต้น)
workers_dev = true

# วิธีที่ 2: ผูกกับโดเมนของคุณ (ปลดล็อก comment ด้านล่าง)
# [[routes]]
# pattern = "api.sorworaphatinterfoods.net/*"
# zone_name = "sorworaphatinterfoods.net"
