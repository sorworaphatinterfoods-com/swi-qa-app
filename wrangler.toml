name = "swi-qa-api"
main = "worker.js"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]
account_id = "acd0ef2518aed1f77c126d0592469ae1"

# ==================================================
# D1 Database — use the existing qa-factory-db
# ==================================================
[[d1_databases]]
binding       = "DB"
database_name = "qa-factory-db"
database_id   = "ebc2b44a-de57-4c09-a7d2-56ff189903a5"

# Document Control System (DCS) — separate D1 used by /api/dcs/* endpoints
[[d1_databases]]
binding       = "DCS_DB"
database_name = "dcs_document_control"
database_id   = "8ce825c6-df55-4b13-bea3-c1ae46465b48"

# ==================================================
# KV Namespaces
# ==================================================
[[kv_namespaces]]
binding = "SESSION"
id      = "95193f18725940a4bfafa69799fb166c"

[[kv_namespaces]]
binding = "CACHE"
id      = "b3b02cc0bb9141d387e7a17446b670ee"

# ==================================================
# Environment Variables
# ==================================================
[vars]
ENVIRONMENT = "production"

# JWT_SECRET ตั้งใน Cloudflare dashboard > Settings > Variables (Secret)
# หรือใช้คำสั่ง: wrangler secret put JWT_SECRET

# ==================================================
# Routes (เลือกอันใดอันหนึ่ง)
# ==================================================
# วิธีที่ 1: ใช้ workers.dev subdomain (เริ่มต้น)
workers_dev = true

# วิธีที่ 2: ผูกกับโดเมนของคุณ (ปลดล็อก comment ด้านล่าง)
# [[routes]]
# pattern = "api.sorworaphatinterfoods.net/*"
# zone_name = "sorworaphatinterfoods.net"
