<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>แจ้งข้อร้องเรียนลูกค้า — SWI Foods</title>
<meta name="robots" content="noindex">
<link rel="icon" href="./favicon-32.png">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --brand:#0D6E64; --brand-d:#08544C; --ink:#15201e; --mute:#5b6b68; --line:#d7dcdf; --bg:#eef2f1; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'IBM Plex Sans Thai',sans-serif; color:var(--ink);
    background:linear-gradient(135deg,#08544C 0%,#0D6E64 45%,#0B1220 100%); min-height:100vh; padding:24px 14px; }
  .wrap { max-width:560px; margin:0 auto; }
  .card { background:#fff; border-radius:16px; box-shadow:0 12px 40px rgba(0,0,0,.25); overflow:hidden; }
  .head { text-align:center; padding:22px 20px 8px; }
  .head img { height:54px; object-fit:contain; }
  .head .logofallback { font-weight:700; color:var(--brand); font-size:20px; }
  .head h1 { font-size:18px; margin:10px 0 2px; }
  .head p { font-size:13px; color:var(--mute); margin:0; }
  .body { padding:8px 20px 20px; }
  label { display:block; font-size:13px; font-weight:600; margin:12px 0 5px; }
  label .req { color:#c0392b; }
  input, select, textarea { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:10px;
    font-family:inherit; font-size:15px; color:var(--ink); background:#fff; }
  input:focus, select:focus, textarea:focus { outline:none; border-color:var(--brand); box-shadow:0 0 0 3px rgba(13,110,100,.12); }
  textarea { resize:vertical; min-height:84px; }
  .row { display:flex; gap:10px; }
  .row > div { flex:1; }
  .btn { width:100%; margin-top:18px; padding:13px; border:none; border-radius:10px; background:var(--brand);
    color:#fff; font-family:inherit; font-size:16px; font-weight:600; cursor:pointer; }
  .btn:disabled { opacity:.6; cursor:default; }
  .hint { font-size:12px; color:var(--mute); margin-top:4px; }
  .foot { text-align:center; font-size:12px; color:rgba(255,255,255,.85); margin-top:16px; }
  .ok { text-align:center; padding:34px 22px; }
  .ok .check { width:64px;height:64px;border-radius:50%;background:#dff5ec;color:#047040;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 14px; }
  .ok h2 { margin:0 0 6px; font-size:20px; }
  .ok .ref { display:inline-block; margin:10px 0; font-family:monospace; font-size:18px; background:#f1f5f4; padding:6px 14px; border-radius:8px; color:var(--brand); font-weight:700; }
  .ok p { color:var(--mute); font-size:14px; }
  .linkbtn { background:none; border:1px solid var(--brand); color:var(--brand); }
  .err { background:#fde8e8; color:#b91c1c; border-radius:10px; padding:10px 12px; font-size:14px; margin-top:14px; display:none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="head">
      <img src="./logo-swi.png" alt="SWI Foods" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'logofallback',textContent:'SWI FOODS'}))">
      <h1>แบบฟอร์มแจ้งข้อร้องเรียนลูกค้า</h1>
      <p>Customer Complaint Form — สำหรับฝ่ายขาย</p>
    </div>

    <div class="body" id="formArea">
      <label>ชื่อลูกค้า / ร้านค้า <span class="req">*</span></label>
      <input id="f_customer" placeholder="เช่น MK / Lotus's / 7-Eleven / ร้านค้า ก.">

      <div class="row">
        <div>
          <label>ช่องทางรับเรื่อง</label>
          <select id="f_channel">
            <option value="">-- เลือก --</option>
            <option value="Phone">โทรศัพท์</option>
            <option value="Email">Email</option>
            <option value="LINE">LINE</option>
            <option value="Walk-in">Walk-in</option>
            <option value="Social">Social Media</option>
          </select>
        </div>
        <div>
          <label>ความรุนแรง / ประเภท</label>
          <select id="f_severity">
            <option value="Minor">Minor (เล็กน้อย)</option>
            <option value="Major">Major (สำคัญ)</option>
            <option value="Critical">Critical (วิกฤต)</option>
            <option value="Suggestion">ข้อเสนอแนะ (Suggestion)</option>
          </select>
        </div>
      </div>

      <label>เบอร์ / อีเมล ติดต่อลูกค้า</label>
      <input id="f_contact" placeholder="เบอร์โทร หรืออีเมลลูกค้า (ถ้ามี)">

      <div class="row">
        <div>
          <label>สินค้าที่เกี่ยวข้อง</label>
          <select id="f_product"><option value="">-- กำลังโหลด --</option></select>
        </div>
        <div>
          <label>Batch / Lot No.</label>
          <input id="f_batch" placeholder="เช่น B2406">
        </div>
      </div>

      <label>เรื่องร้องเรียน <span class="req">*</span></label>
      <input id="f_subject" placeholder="สรุปสั้น ๆ เช่น สินค้ามีกลิ่นผิดปกติ">

      <label>รายละเอียด <span class="req">*</span></label>
      <textarea id="f_description" placeholder="อธิบายปัญหา/อาการที่ลูกค้าแจ้ง วันเวลาที่พบ จำนวน ฯลฯ"></textarea>

      <label>ชื่อผู้แจ้ง (ฝ่ายขาย)</label>
      <input id="f_reporter" placeholder="ชื่อพนักงานฝ่ายขายที่กรอกฟอร์ม">

      <div class="err" id="errBox"></div>
      <button class="btn" id="submitBtn" onclick="submitComplaint()">ส่งข้อร้องเรียน</button>
      <div class="hint">เมื่อส่งแล้ว เรื่องจะเข้าทะเบียนข้อร้องเรียนของฝ่าย QA โดยอัตโนมัติ</div>
    </div>

    <div class="body ok" id="okArea" style="display:none">
      <div class="check">✓</div>
      <h2>ส่งข้อร้องเรียนสำเร็จ</h2>
      <p>ฝ่าย QA ได้รับเรื่องแล้ว เลขที่อ้างอิง:</p>
      <div class="ref" id="okRef">—</div>
      <p>ขอบคุณครับ/ค่ะ</p>
      <button class="btn linkbtn" onclick="resetForm()">+ แจ้งเรื่องใหม่</button>
    </div>
  </div>
  <div class="foot">Sorworaphat InterFoods Co., Ltd. · Smart QA System</div>
</div>

<script>
const API_BASE = 'https://swi-qa-api.swifoods.workers.dev';
const $ = id => document.getElementById(id);
function today(){ return new Date().toISOString().slice(0,10); }

// Load finished-goods for the product dropdown (best effort)
(async function loadProducts(){
  const sel = $('f_product');
  try {
    const r = await fetch(API_BASE + '/api/finished_goods?limit=500');
    const d = await r.json();
    const list = (d.data || []).slice().sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    sel.innerHTML = '<option value="">-- เลือกสินค้า (หรือเว้นว่าง) --</option>'
      + list.map(p => `<option value="${(p.id||'').replace(/"/g,'&quot;')}">${(p.name||p.id)}</option>`).join('')
      + '<option value="__other">อื่น ๆ / ไม่อยู่ในรายการ</option>';
  } catch(e) {
    sel.innerHTML = '<option value="">(พิมพ์ชื่อสินค้าในช่องรายละเอียด)</option>';
  }
})();

function showErr(msg){ const e=$('errBox'); e.textContent=msg; e.style.display='block'; }

async function submitComplaint(){
  const customer = $('f_customer').value.trim();
  const subject = $('f_subject').value.trim();
  const description = $('f_description').value.trim();
  if (!customer || !subject || !description) { showErr('กรุณากรอก ชื่อลูกค้า, เรื่องร้องเรียน และรายละเอียด ให้ครบ'); return; }
  $('errBox').style.display='none';

  const contact = $('f_contact').value.trim();
  const reporter = $('f_reporter').value.trim();
  let prod = $('f_product').value;
  if (prod === '__other') prod = '';

  // keep extra info inside description (no dedicated columns for them)
  let desc = description;
  const extra = [];
  if (contact) extra.push('ติดต่อลูกค้า: ' + contact);
  if (reporter) extra.push('แจ้งโดย (ฝ่ายขาย): ' + reporter);
  if (extra.length) desc += '\n\n— ' + extra.join('\n— ');

  const body = {
    date: today(),
    customer,
    channel: $('f_channel').value || null,
    product: prod || null,
    batch: $('f_batch').value.trim() || null,
    subject,
    description: desc,
    severity: $('f_severity').value || 'Minor',
    status: 'Open'
  };

  const btn = $('submitBtn'); btn.disabled = true; btn.textContent = 'กำลังส่ง...';
  try {
    const r = await fetch(API_BASE + '/api/complaints', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    const d = await r.json().catch(()=>({}));
    if (!r.ok || d.error) throw new Error(d.error || ('HTTP ' + r.status));
    $('okRef').textContent = d.id || '(บันทึกแล้ว)';
    $('formArea').style.display = 'none';
    $('okArea').style.display = 'block';
    window.scrollTo(0,0);
  } catch(e) {
    showErr('ส่งไม่สำเร็จ: ' + e.message + ' — กรุณาลองใหม่อีกครั้ง');
    btn.disabled = false; btn.textContent = 'ส่งข้อร้องเรียน';
  }
}
function resetForm(){
  ['f_customer','f_contact','f_batch','f_subject','f_description','f_reporter'].forEach(id=>$(id).value='');
  $('f_channel').value=''; $('f_severity').value='Minor'; $('f_product').value='';
  $('okArea').style.display='none'; $('formArea').style.display='block';
  const btn=$('submitBtn'); btn.disabled=false; btn.textContent='ส่งข้อร้องเรียน';
  window.scrollTo(0,0);
}
</script>
</body>
</html>
