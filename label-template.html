<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>เทมเพลตฉลากสินค้า อย. — SWI Foods</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
body { font-family:'Noto Serif Thai',serif; margin:0; background:#e9edf0; color:#000; }

.toolbar { text-align:center; padding:12px; }
.toolbar button { font-family:inherit; background:#0D6E64; color:#fff; border:none; padding:8px 22px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }
.toolbar .note { font-size:10px; color:#555; margin-top:5px; }

/* ── on-screen: show at 2.5× so it's easy to read ── */
.label-screen-wrap {
  display:flex; justify-content:center; padding:12px;
}
.label-scale {
  transform:scale(2.5);
  transform-origin:top center;
  margin-bottom:calc(75mm * 2.5 - 75mm + 24px);  /* compensate scale height */
}

/* ── Label: 10 cm × 7.5 cm ── */
.label {
  width:96mm;    /* 100mm − 2mm margin × 2 */
  height:71mm;   /* 75mm  − 2mm margin × 2 */
  background:#fff;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  border:0.5px solid #ccc; /* visible border on screen; won't show if exact fit in print */
}

@media print {
  body { background:#fff; }
  .toolbar, .label-screen-wrap { display:none; }
  .label-print-wrap { display:block !important; }
  .label { width:96mm; height:71mm; border:none; }
  @page { size:100mm 75mm; margin:2mm; }
}
.label-print-wrap { display:none; }

/* ══════════════════════════
   Both halves = flex:1 = 50%
   ══════════════════════════ */
.top-half, .bottom-half {
  flex:1;
  min-height:0;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ══ TOP HALF ══ */
.top-half {
  border-bottom:1.5px solid #000;   /* ← แกนนอน กลาง */
  padding:1.2mm 2mm 1mm;
}

.prod-title {
  font-size:8px;
  font-weight:800;
  line-height:1.2;
  flex-shrink:0;
}
.prod-meta {
  display:flex; align-items:baseline; gap:4px;
  flex-shrink:0; margin-bottom:0.8mm;
}
.prod-brand { font-size:6px; font-weight:700; }
.prod-en    { font-size:5.5px; color:#444; line-height:1.3; }

/* 2-col grid: 1fr 1fr (แกนตั้งกลาง) */
.top-grid {
  display:grid;
  grid-template-columns:1fr 1fr;   /* ← แกนตั้ง กลาง */
  gap:2px;
  flex:1;
  min-height:0;
}
.top-left {
  display:flex; flex-direction:column; gap:1px;
  overflow:hidden;
  border-right:1px solid #bbb;
  padding-right:2px;
}
.top-right {
  display:flex; flex-direction:column; gap:2px;
  overflow:hidden;
  padding-left:2px;
}

.sec-h {
  font-size:5.5px; font-weight:700;
  border-bottom:0.5px solid #000;
  padding-bottom:0.5px; margin-bottom:1px;
  flex-shrink:0;
}

.ingr-grid {
  display:grid; grid-template-columns:1fr auto;
  column-gap:2px; font-size:5.5px; line-height:1.4;
}
.ingr-grid .pct { font-weight:700; white-space:nowrap; }

.add-line { font-size:5.5px; line-height:1.4; }
.allg-warn { font-size:5.5px; color:#c00; font-weight:700; }

/* Right column */
.fda-box {
  border:1px solid #000; border-radius:3px;
  padding:1px 3px; text-align:center; flex-shrink:0;
}
.fda-lbl { font-size:5px; font-weight:700; }
.fda-num { font-size:6px; font-weight:800; letter-spacing:0.2px; }

.mfg-block { font-size:5.5px; line-height:1.4; }
.mfg-block b { font-size:6px; }

.date-block { font-size:5.5px; line-height:1.4; }

.weight-box {
  border:1.5px solid #cc0000; border-radius:4px;
  text-align:center; padding:1px 3px; flex-shrink:0;
}
.wt-lbl  { font-size:5px; font-weight:700; color:#cc0000; }
.wt-num  { font-size:16px; font-weight:800; color:#cc0000; line-height:1; }
.wt-unit { font-size:7px; font-weight:700; color:#cc0000; }
.wt-pack { font-size:5px; color:#cc0000; }

.barcode-box {
  flex:1; min-height:0;
  border:1px dashed #888; border-radius:3px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  font-size:5px; color:#666; gap:1px;
}
.bc-title { font-size:6px; font-weight:700; color:#000; }

/* ══ BOTTOM HALF ══ */
.bottom-half { padding:1mm 2mm 1mm; }

.bottom-grid {
  display:grid;
  grid-template-columns:1fr 1fr;   /* แกนตั้งกลาง เช่นเดียวกับบน */
  gap:3px; height:100%;
}
.bot-col { display:flex; flex-direction:column; overflow:hidden; }
.bot-col + .bot-col { border-left:1px solid #bbb; padding-left:3px; }

.bot-h {
  font-size:6px; font-weight:700;
  border-bottom:1px solid #000;
  padding-bottom:0.5px; margin-bottom:2px; flex-shrink:0;
}

.stor-item {
  display:flex; gap:2px; font-size:5.5px; line-height:1.4; margin-bottom:1px;
}
.stor-item::before { content:'•'; flex-shrink:0; font-weight:700; }

.prep-step { display:flex; gap:3px; font-size:5.5px; line-height:1.4; margin-bottom:2px; align-items:flex-start; }
.sn {
  background:#000; color:#fff; border-radius:50%;
  width:9px; height:9px; min-width:9px;
  display:flex; align-items:center; justify-content:center;
  font-size:5px; font-weight:700; flex-shrink:0; margin-top:1px;
}
.sb { font-weight:700; }

.notice { font-size:5px; color:#555; margin-top:auto; padding-top:1px; flex-shrink:0; }
</style>
</head>
<body>

<div class="toolbar">
  <button onclick="window.print()">🖨 พิมพ์ / บันทึก PDF</button>
  <div class="note">ขนาดฉลาก: <b>10 × 7.5 cm</b> · แสดงขยาย 2.5× บนหน้าจอ · ปริ้นท์จะได้ขนาดจริง</div>
</div>

<!-- Screen preview (scaled 2.5×) -->
<div class="label-screen-wrap">
  <div class="label-scale">
    <div class="label" id="lbl"></div>
  </div>
</div>

<!-- Print (unscaled, direct) -->
<div class="label-print-wrap">
  <div class="label" id="lbl-print"></div>
</div>

<script>
var CONTENT = `
<div class="top-half">
  <div class="prod-title">นิ้วไก่ทอดให้หนักซอสแดงสูตรโบราณ (แช่แข็ง)</div>
  <div class="prod-meta">
    <span class="prod-brand">ตรา ไก่เบอร์หนึ่ง</span>
    <span class="prod-en">FROZEN (READY-TO-COOK) MARINATED CHICKEN TAILS IN TRADITIONAL RED SAUCE</span>
  </div>
  <div class="top-grid">
    <div class="top-left">
      <div class="sec-h">ส่วนประกอบที่สำคัญ โดยประมาณ</div>
      <div class="ingr-grid">
        <span>เนื้อไก่</span><span class="pct">85%</span>
        <span>ซอสหอย</span><span class="pct">8.5%</span>
        <span>ซอสหวาน</span><span class="pct">3.5%</span>
        <span>ผงปรุงรส</span><span class="pct">0.9%</span>
        <span>เกลือบริโภคเสริมไอโอดีน</span><span class="pct">0.5%</span>
        <span>กระเทียม</span><span class="pct">0.4%</span>
        <span>พริกไทย</span><span class="pct">0.3%</span>
      </div>
      <div class="sec-h" style="margin-top:1px">วัตถุเจือปนอาหาร</div>
      <div class="add-line">ไม่ใช้ INS 621 · INS110, INS124 · <b>ไม่มีวัตถุกันเสีย</b></div>
      <div class="sec-h" style="margin-top:1px">ข้อมูลผู้แพ้อาหาร</div>
      <div class="allg-warn">⚠ ถั่วเหลือง · หอย · ปลา</div>
    </div>
    <div class="top-right">
      <div class="fda-box">
        <div class="fda-lbl">เลขสารบบอาหาร (อย.)</div>
        <div class="fda-num">– – – – – – –</div>
      </div>
      <div class="mfg-block"><b>ผลิตโดย:</b> บริษัท ศ.วรภัทร อินเตอร์ ฟู้ดส์ จำกัด<br>37/77 ม.6 ต.คลองหลวงแท้ว อ.ลาดหลุมแก้ว ปทุมธานี 12140</div>
      <div class="date-block"><b>วันที่ผลิต/หมดอายุ:</b> ระบุบนบรรจุภัณฑ์</div>
      <div class="weight-box">
        <div class="wt-lbl">น้ำหนักสุทธิ</div>
        <div><span class="wt-num">3.00</span>&thinsp;<span class="wt-unit">Kg.</span></div>
        <div class="wt-pack">(บรรจุ 50 ไม้)</div>
      </div>
      <div class="barcode-box">
        <div class="bc-title">Barcode</div>
        <div>MFG / EXP</div>
      </div>
    </div>
  </div>
</div>
<div class="bottom-half">
  <div class="bottom-grid">
    <div class="bot-col">
      <div class="bot-h">❄️ การเก็บรักษา</div>
      <div class="stor-item">เก็บในช่องแช่แข็ง ต่ำกว่า -18°C</div>
      <div class="stor-item">เปิดแล้วบริโภคภายใน 24 ชม. ปรุงสุกก่อนทุกครั้ง</div>
      <div class="stor-item">ห้ามนำกลับมาแช่แข็งซ้ำ</div>
      <div class="notice">* ต้องปรุงให้สุกก่อนรับประทาน</div>
    </div>
    <div class="bot-col">
      <div class="bot-h">🔥 วิธีปรุง</div>
      <div class="prep-step"><div class="sn">1</div><div><span class="sb">ละลาย:</span> ตู้เย็น 0–4°C ประมาณ 12 ชม.</div></div>
      <div class="prep-step"><div class="sn">2</div><div><span class="sb">ปิ้ง/ย่าง:</span> ไฟอ่อน-กลาง พลิกให้สุกทั่ว</div></div>
      <div class="prep-step"><div class="sn">3</div><div><span class="sb">แอร์ฟรายเออร์:</span> 180°C · 12–15 นาที</div></div>
    </div>
  </div>
</div>`;

document.getElementById('lbl').innerHTML       = CONTENT;
document.getElementById('lbl-print').innerHTML = CONTENT;
</script>
</body>
</html>
