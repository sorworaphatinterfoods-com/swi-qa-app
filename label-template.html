<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>เทมเพลตฉลากสินค้า อย. — SWI Foods</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
body { font-family:'Noto Serif Thai',serif; margin:0; background:#e9edf0; color:#000; }

.toolbar { text-align:center; padding:12px; }
.toolbar button { font-family:inherit; background:#0D6E64; color:#fff; border:none; padding:8px 22px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }
.toolbar .note { font-size:10px; color:#555; margin-top:5px; }

/* Screen: show 2.5× for readability */
.screen-wrap { display:flex; justify-content:center; padding:20px 12px; }
.screen-scale {
  transform:scale(2.5);
  transform-origin:top center;
  margin-bottom:calc(71mm * 1.52);
}

@media print {
  body { background:#fff; }
  .toolbar, .screen-wrap { display:none; }
  .print-wrap { display:block !important; }
  @page { size:100mm 75mm; margin:2mm; }
}
.print-wrap { display:none; }

/* ══ LABEL BOX ══ */
.label {
  width:96mm; height:71mm;
  border:2px solid #000; border-radius:5mm;
  padding:1.5mm 2mm 1mm;
  display:flex; flex-direction:column; gap:0.7mm;
  overflow:hidden; background:#fff;
}

/* ── HEADER ── */
.prod-name {
  font-size:11px; font-weight:800;
  text-align:center; line-height:1.15;
  flex-shrink:0;
}
.brand-line {
  display:flex; align-items:center; gap:3px;
  flex-shrink:0;
}
.b-rule { flex:1; border-top:1px solid #000; }
.b-text { font-size:6.5px; font-weight:700; white-space:nowrap; padding:0 1px; }

/* ── INFO BAR ── */
.info-bar {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:1.5mm; height:14mm; flex-shrink:0;
}
.i-cell { border:1.5px solid #000; border-radius:2.5mm; padding:1mm 1.5mm; overflow:hidden; }

/* RTC */
.rtc-inner { display:flex; align-items:center; gap:2mm; height:100%; }
.rtc-icon { font-size:17px; flex-shrink:0; }
.rtc-title { font-size:10px; font-weight:800; line-height:1; display:block; }
.rtc-th   { font-size:5.5px; line-height:1.4; display:block; margin-top:1px; }
.rtc-en   { font-size:5px; color:#555; display:block; }

/* Weight */
.wt-cell {
  border-color:#cc0000 !important; border-width:2px !important;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center;
}
.wt-lbl  { font-size:5.5px; font-weight:700; color:#cc0000; line-height:1; }
.wt-num  { font-size:24px; font-weight:800; color:#cc0000; line-height:1; }
.wt-unit { font-size:11px; font-weight:700; color:#cc0000; }
.wt-pack { font-size:5px; color:#cc0000; }

/* FDA */
.fda-inner { display:flex; align-items:center; justify-content:center; gap:3mm; height:100%; }
.fda-num { font-size:7px; font-weight:700; line-height:1.5; }

/* ── 5 PANELS ── */
.panels {
  display:grid; grid-template-columns:repeat(5,1fr);
  gap:1mm; flex:1; min-height:0;
}
.panel {
  border:1px solid #000; border-radius:2mm;
  padding:1mm 1.5mm; overflow:hidden;
  display:flex; flex-direction:column;
}
.p-head {
  display:flex; align-items:flex-start; gap:2px;
  font-size:5.5px; font-weight:700; line-height:1.2;
  border-bottom:0.5px solid #000; padding-bottom:1.5px; margin-bottom:2px;
  flex-shrink:0;
}
.p-icon { font-size:11px; line-height:1; flex-shrink:0; }
.p-body { font-size:5.5px; line-height:1.4; overflow:hidden; }

/* Ingredients */
.ir { display:flex; justify-content:space-between; gap:2px; }
.ir .pct { font-weight:700; white-space:nowrap; }

/* Additives */
.ab { display:flex; gap:2px; margin-bottom:1px; }
.ab::before { content:'•'; flex-shrink:0; }
.nop { font-weight:700; margin-top:3px; }

/* Allergens */
.allg { display:flex; align-items:center; gap:3px; margin-bottom:2px; }
.allg-i { font-size:11px; flex-shrink:0; }

/* Storage */
.sb { display:flex; gap:2px; margin-bottom:1px; }
.sb::before { content:'•'; flex-shrink:0; }

/* Prep steps */
.ps { display:flex; gap:3px; align-items:flex-start; margin-bottom:2px; }
.sn {
  background:#000; color:#fff; border-radius:50%;
  width:9px; height:9px; min-width:9px;
  display:flex; align-items:center; justify-content:center;
  font-size:5px; font-weight:700; flex-shrink:0; margin-top:1px;
}
.sb2 { font-weight:700; }

/* ── FOOTER ── */
.footer {
  border-top:1px solid #000; padding-top:1mm;
  display:grid; grid-template-columns:2fr 1.2fr 1fr;
  gap:1.5mm; flex-shrink:0;
}
.ft-left { display:flex; gap:2mm; overflow:hidden; }
.ft-icon { font-size:16px; flex-shrink:0; line-height:1; }
.ft-t { font-size:6px; font-weight:700; line-height:1.3; }
.ft-s { font-size:5.5px; line-height:1.4; }

.ft-mid { font-size:5.5px; text-align:center; line-height:1.5; }
.ft-mid b { font-size:6px; }

.ft-bc {
  border:1px dashed #666; border-radius:2mm;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  font-size:5.5px; color:#555; text-align:center; gap:1px;
}
.ft-bc b { font-size:6px; color:#000; }

/* ── BOTTOM NOTE ── */
.b-note { text-align:center; font-size:5px; flex-shrink:0; }
</style>
</head>
<body>

<div class="toolbar">
  <button onclick="window.print()">🖨 พิมพ์ / บันทึก PDF</button>
  <div class="note">ขนาดจริง: <b>10 × 7.5 cm</b> · หน้าจอแสดงขยาย 2.5× · ปริ้นท์ได้ขนาดจริง</div>
</div>

<!-- Screen preview -->
<div class="screen-wrap">
  <div class="screen-scale"><div class="label" id="ls"></div></div>
</div>

<!-- Print (unscaled) -->
<div class="print-wrap"><div class="label" id="lp"></div></div>

<script>
var HTML = `
  <div class="prod-name">หมูปิ้งนมสด (ผสมไก่) (แช่แข็ง)</div>

  <div class="brand-line">
    <div class="b-rule"></div>
    <div class="b-text">ตรา หมูปิ้งอนุสาวรีย์ชัย</div>
    <div class="b-rule"></div>
  </div>

  <!-- INFO BAR -->
  <div class="info-bar">

    <div class="i-cell">
      <div class="rtc-inner">
        <div class="rtc-icon">🍳</div>
        <div>
          <span class="rtc-title">RTC</span>
          <span class="rtc-th">ต้องปรุงให้สุกก่อนรับประทาน</span>
          <span class="rtc-en">Prep Required</span>
        </div>
      </div>
    </div>

    <div class="i-cell wt-cell">
      <div class="wt-lbl">น้ำหนักสุทธิ</div>
      <div><span class="wt-num">500</span>&thinsp;<span class="wt-unit">กรัม</span></div>
      <div class="wt-pack">(บรรจุ 10 ไม้)</div>
    </div>

    <div class="i-cell">
      <div class="fda-inner">
        <svg width="30" height="30" viewBox="0 0 48 48" fill="none">
          <polygon points="24,2 46,44 2,44" stroke="#000" stroke-width="2.5"/>
          <polygon points="24,10 40,40 8,40" stroke="#000" stroke-width="1.5"/>
          <text x="24" y="38" text-anchor="middle" font-size="11" font-weight="700" fill="#000" font-family="'Noto Serif Thai',serif">อย.</text>
        </svg>
        <div class="fda-num">อย.<br>13-2-07462-6-0004</div>
      </div>
    </div>

  </div>

  <!-- 5 PANELS -->
  <div class="panels">

    <!-- 1: Ingredients -->
    <div class="panel">
      <div class="p-head"><span class="p-icon">🥘</span><span>ส่วนประกอบสำคัญ<br>โดยประมาณ</span></div>
      <div class="p-body">
        <div class="ir"><span>เนื้อหมู</span><span class="pct">42%</span></div>

        <div class="ir"><span>เนื้อไก่</span><span class="pct">15%</span></div>
        <div class="ir"><span>น้ำตาล</span><span class="pct">12%</span></div>
        <div class="ir"><span>เครื่องปรุงรสอื่นๆ</span><span class="pct">5%</span></div>

      </div>
    </div>

    <!-- 2: Additives -->
    <div class="panel">
      <div class="p-head"><span class="p-icon">⚗</span><span>ข้อมูลวัตถุดิบ/<br>อาหาร</span></div>

    <div class="panel">

        <div class="allg"><span class="allg-i">🦪</span><span>หอย</span></div>
      </div>
    </div>

    <!-- 4: Storage -->
    <div class="panel">
      <div class="p-head"><span class="p-icon">❄️</span><span>ข้อแนะนำในการ<br>เก็บรักษา</span></div>
      <div class="p-body">
        <div class="sb">เก็บในช่องแช่แข็ง (Freezer) อุณหภูมิต่ำกว่า -18°C</div>
        <div class="sb">เมื่อเปิดบรรจุภัณฑ์แล้ว ควรบริโภคให้หมดภายใน 24 ชั่วโมง และต้องปรุงสุกทุกครั้งก่อนบริโภค</div>
        <div class="sb">ไม่ควรนำอาหารที่ละลายแล้ว นำกลับมาแช่แข็งซ้ำอีก</div>
      </div>
    </div>

    <!-- 5: Preparation -->
    <div class="panel">
      <div class="p-head"><span class="p-icon">♨️</span><span>วิธีปรุงเพื่อ<br>รับประทาน</span></div>
      <div class="p-body">
        <div class="ps"><div class="sn">1</div><div><span class="sb2">การละลาย:</span> ควรละลายในตู้เย็น ช่องเย็น (0–4°C) ประมาณ 12 ชั่วโมง</div></div>
        <div class="ps"><div class="sn">2</div><div><span class="sb2">การเตาปิ้ง/ย่าง:</span> ปิ้ง/ย่างด้วยเตาถ่าน หรือเตาไฟฟ้า ระดับไฟอ่อนถึงกลาง พลิกกลับให้สุกทั่ว</div></div>
        <div class="ps"><div class="sn">3</div><div><span class="sb2">การอบด้วยหม้อทอดไร้น้ำมัน:</span> อุณหภูมิ 180°C นาน 12–15 นาที จนสุกทั่วถึง</div></div>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="ft-left">
      <div class="ft-icon">🏭</div>
      <div>
        <div class="ft-t">ผลิตโดย:</div>
        <div class="ft-s">บริษัท ศ.วรภัทร อินเตอร์ ฟู้ดส์ จำกัด<br>37/77 หมู่ 6 ตำบลคลองหลวงแท้ว<br>อำเภอลาดหลุมแก้ว จังหวัดปทุมธานี 12140</div>
      </div>
    </div>
    <div class="ft-mid">
      <b>วันที่ผลิต / หมดอายุ:</b><br>
      ระบุบนบรรจุภัณฑ์
    </div>
    <div class="ft-bc">
      <b>Barcode</b>
      <span>และการประทับตรา MFG/EXP</span>
    </div>
  </div>

  <div class="b-note">* คำแนะนำ: ต้องปรุงให้สุกก่อนรับประทาน *</div>
`;

document.getElementById('ls').innerHTML = HTML;
document.getElementById('lp').innerHTML = HTML;
</script>
</body>
</html>
